name: Neural Digest

on:
  schedule:
    # المواعيد بتوقيت UTC. التوقيت المحلي = Asia/Amman (UTC+3 دائم بلا توقيت صيفي).
    # ثمانية منشورات يومياً (الوضع auto يختار النوع حسب الساعة المحلية).
    - cron: "0 6 * * *"   # 09:00 عمّان → paper
    - cron: "0 8 * * *"   # 11:00 عمّان → concept
    - cron: "0 10 * * *"  # 01:00 ظهراً عمّان → news
    - cron: "0 12 * * *"  # 03:00 عصراً عمّان → explain (شرح معمّق)
    - cron: "0 14 * * *"  # 05:00 عصراً عمّان → paper
    - cron: "0 16 * * *"  # 07:00 مساءً عمّان → concept
    - cron: "0 18 * * *"  # 09:00 مساءً عمّان → news
    - cron: "0 20 * * *"  # 11:00 مساءً عمّان → explain (والجمعة → weekly)
  workflow_dispatch:
    inputs:
      mode:
        description: "الوضع المطلوب تشغيله يدوياً"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - paper
          - explain
          - news
          - concept
          - digest
          - weekly
          - test

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Neural Digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python main.py --mode "${{ github.event.inputs.mode || 'auto' }}"

      - name: Commit updated store
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/store.json
          if git diff --staged --quiet; then
            echo "لا تغييرات في data/store.json — لا حاجة للـ commit."
          else
            git commit -m "chore: update dedup store [skip ci]"
            git push
          fi
